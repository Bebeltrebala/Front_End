<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>  
    <h1 id="titulo">Olá mundo</h1>   <!-- id = identificador da tag -->
</body>
<style>
    h1{
        color: orange;
    }
</style>
<script>
    function mudar(){
        titulo.style.color = "red"; 
    }
    titulo.addEventListener("click",mudar); //evento que vai ocorrer e a função que vai ser executada
</script>
</html>
